# CORR-036 (2026-07-21): aligned with input/company/classification.yaml
# (canonical source). Previous values (employees: 50, revenue: 5M,
# size: small) were a stale snapshot inconsistent with classification.yaml
# and with 01_Company_Context.md / 05_company_context.csv / the Case_01
# reference output in Methodology-main. TinyTask is a MICRO case by design
# (8 employees, EUR 2M revenue, security_fte 0.85).
company:
  name: "TinyTask Lda."              # era "TinyTask SaaS"
  sector: "Technology/Software"      # era "technology"
  size: "micro"                      # era "small"
  employees: 8                       # era 50
  revenue_eur: 2000000               # era 5000000
  jurisdiction: "Portugal, EU"       # inalterado
  processes_personal_data: true
  places_digital_products_eu: true
  dora_financial_entity: false
  nis2_sector: ""
  aiact_high_risk_system: false
  technological_control_plane: "web application"
  data_types:
    - "email"
    - "name"
    - "password"
    - "phone"
    - "address"
  tech_stack:
    - "python"
    - "django"
    - "postgresql"
    - "aws"
    - "react"
  eu_data_subjects: 5000

regulations:
  - abbreviation: "GDPR"
    name: "General Data Protection Regulation"
    applicable: true
    reason: "Processes personal data of EU residents (5000 data subjects); data_types include email, name, address, phone"
    obligated_party: "CONTROLLER"
  - abbreviation: "CRA"
    name: "Cyber Resilience Act"
    applicable: true
    reason: "Places digital products with digital elements on EU market (web application SaaS)"
    obligated_party: "MANUFACTURER"
  - abbreviation: "NIS2"
    name: "Network and Information Security Directive 2"
    applicable: false
    reason: "Not in NIS2 sector (technology/IT services, not Annex I/II); 50 employees below medium threshold"
    obligated_party: ""
  - abbreviation: "DORA"
    name: "Digital Operational Resilience Act"
    applicable: false
    reason: "Not a financial entity per Art. 2(1); not an ICT third-party provider to financial entities"
    obligated_party: ""
  - abbreviation: "AIACT"
    name: "Artificial Intelligence Act"
    applicable: false
    reason: "No high-risk AI system (Annex II product or Annex III use case); no AI system in scope"
    obligated_party: ""

